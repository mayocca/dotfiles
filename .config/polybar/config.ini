[colors]
background = #212121
foreground = #EEEEEE
primary = #F5F5F5
secondary = #E0E0E0

disabled = #616161
success = #388E3C
warning = #FBC02D
alert = #D32F2F

[bar/main]
width = 100%:-60
offset-x = 30
#offset-y = 10

height = 32
radius = 4

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 5
border-color = #00000000

padding-left = 2
padding-right = 3

module-margin = 1

font-0 = Hack Nerd Font:pixelsize=12;antialias=true;3
font-1 = Hack Nerd Font:style=Regular:pixelsize=21:antialias=true;4.5
font-2 = Hack Nerd Font:style=Regular:pixelsize=15:antialias=true;3

modules-left = i3
modules-center = xwindow
modules-right = audio xkeyboard wlan eth date powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3
override-redirect = true

[module/i3]
type = internal/i3
pin-workspaces = false
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

ws-icon-default = ""
ws-icon-0 = "0;%{T3}%{T-}"
ws-icon-1 = "1;%{T3}謹%{T-}"
ws-icon-2 = "2;%{T3}%{T-}"
ws-icon-3 = "3;"
ws-icon-4 = "4;ﭮ"
ws-icon-5 = "5;"
ws-icon-6 = "6;6"
ws-icon-7 = "7;7"
ws-icon-8 = "8;"
ws-icon-9 = "9;"

format = <label-state>

label-focused = %icon%
label-focused-foreground = ${colors.primary}
label-focused-padding = 2

label-unfocused = ${self.label-focused}
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = ${self.label-focused-padding}

label-visible = ${self.label-focused}
label-visible-foreground = ${colors.disabled}
label-visible-padding = ${self.label-focused-padding}

label-urgent = ${self.label-focused}
label-urgent-foreground = ${colors.alert}
label-urgent-padding = ${self.label-focused-padding}

[module/xwindow]
type = internal/xwindow
label = %title:0:32:...%

[module/audio]
type = internal/pulseaudio

format-volume = <ramp-volume>
label-volume-foreground = ${colors.secondary}
ramp-volume-foreground = ${colors.secondary}
label-volume =

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

label-muted = ﱝ
label-muted-foreground = ${colors.secondary}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock
blacklist-2 = caps lock

label-layout = %layout%
label-layout-foreground = ${colors.warning}

[network-base]
type = internal/network
interval = 3
format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/wlan]
inherit = network-base
interface-type = wireless

label-connected = 直
label-connected-foreground = ${colors.success}

label-disconnected = 睊
label-disconnected-foreground = ${colors.alert}

[module/eth]
inherit = network-base
interface-type = wired

label-connected = 
label-connected-foreground = ${colors.success}

label-disconnected = 
label-disconnected-foreground = ${colors.alert}

[module/date]
type = internal/date
interval = 1

date = 
date-alt = "%d/%m/%Y "
time = %H:%M
time-alt = %H:%M:%S

label = %date%%time%

[module/powermenu]
type = custom/text
format-spacing = 1
content = 
content-foreground = ${colors.alert}
click-left = bash ~/.config/rofi/scripts/launch.sh powermenu

[settings]
screenchange-reload = true
#pseudo-transparency = true

